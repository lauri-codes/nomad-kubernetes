name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Allow this job to deploy to Pages and use OIDC for authentication.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Pinned to match the local npm (11.6.2) that generated the lockfile.
          # 'lts/*' floats to a newer npm that re-resolves optional native deps
          # (@emnapi/*) and fails `npm ci`. Bump deliberately, regenerating the lock.
          node-version: '24.11.1'

      - name: Setup @antfu/ni
        run: npm i -g @antfu/ni

      - name: Install dependencies
        run: nci

      - name: Build
        run: nr build --base /${{github.event.repository.name}}/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
